<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Barang Internal SINAR MEGA BINTANG</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    
    <style>
        body { background-color: #f4f7f6; padding-top: 30px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .nav-pills .nav-link { color: #555; font-weight: 500; cursor: pointer; border: 1px solid transparent; margin: 2px; }
        .nav-pills .nav-link.active { background-color: #0d6efd !important; color: white !important; box-shadow: 0 4px 10px rgba(13, 110, 253, 0.3); }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .header-smb { background: linear-gradient(135deg, #0d6efd 0%, #003d99 100%); color: white; padding: 25px; border-radius: 15px 15px 0 0; }
        .table-responsive { min-height: 300px; padding: 10px; }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="card">
        <div class="header-smb text-center">
            <h3><i class="bi bi-box-seam-fill"></i> Monitoring Stok Sinar Mega Bintang</h3>
            <p class="mb-0 small opacity-75">Data terupdate otomatis dari Google Sheets</p>
        </div>
        
        <div class="p-4">
            <ul class="nav nav-pills nav-justified mb-4" id="categoryTabs"></ul>

            <div id="loading" class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Sedang mengambil data terbaru...</p>
            </div>
            
            <div class="table-responsive">
                <table id="stokTable" class="table table-hover w-100" style="display:none;">
                    <thead class="table-dark">
                        <tr id="headerRow"></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const sheetID = '13UBpJFMI3osx9blzUy9Z7-FnYN8efF4znUT_vN3fxWM';
    const categories = ['Area Gudang Tengah', 'Area Depan Kantor', 'Area Gudang Depan', 'Area Gudang Samping'];

    let dataTable;

    function loadData(categoryName) {
        if (dataTable) { dataTable.destroy(); }
        $('#headerRow').empty();
        $('#tableBody').empty();
        $('#stokTable').hide();
        $('#loading').show();

        // Pastikan URL memanggil ID yang benar dan Nama Sheet yang benar
        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(categoryName)}`;

        // Cek apakah library Papa sudah siap
        if (typeof Papa === 'undefined') {
            alert("Library PapaParse gagal dimuat. Coba refresh halaman atau cek koneksi internet.");
            return;
        }

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                const headers = results.meta.fields;

                if (!headers || headers.length === 0) {
                    $('#loading').html('<p class="text-danger">Gagal memuat kolom. Pastikan Google Sheets sudah di-Publish (Anyone with link).</p>');
                    return;
                }

                headers.forEach(h => $('#headerRow').append(`<th>${h}</th>`));

                data.forEach(row => {
                    if (Object.values(row).some(x => x !== "")) {
                        let htmlRow = '<tr>';
                        headers.forEach(h => {
                            let val = row[h] || '-';
                            htmlRow += `<td>${val}</td>`;
                        });
                        htmlRow += '</tr>';
                        $('#tableBody').append(htmlRow);
                    }
                });

                $('#loading').hide();
                $('#stokTable').fadeIn();
                
                dataTable = $('#stokTable').DataTable({
                    responsive: true,
                    pageLength: 25,
                    language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/id.json' }
                });
            },
            error: function(err) {
                console.error("Error PapaParse:", err);
                $('#loading').html('<p class="text-danger">Gagal menarik data. Cek koneksi atau izin Share Google Sheets.</p>');
            }
        });
    }

    function initTabs() {
        $('#categoryTabs').empty();
        categories.forEach((cat, index) => {
            const isActive = index === 0 ? 'active' : '';
            $('#categoryTabs').append(`
                <li class="nav-item">
                    <a class="nav-link ${isActive}" onclick="handleTabClick(this, '${cat}')">${cat}</a>
                </li>
            `);
        });
        loadData(categories[0]);
    }

    function handleTabClick(element, cat) {
        $('.nav-link').removeClass('active');
        $(element).addClass('active');
        loadData(cat);
    }

    $(document).ready(function() {
        initTabs();
    });
</script>

</body>
</html>
