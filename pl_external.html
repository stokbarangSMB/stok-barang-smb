<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PL External - SMB</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        body { background-color: #f4f7f6; padding-top: 20px; font-family: 'Segoe UI', sans-serif; }
        .header-ext { background: linear-gradient(135deg, #343a40 0%, #212529 100%); color: white; padding: 25px; border-radius: 15px 15px 0 0; }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        /* Membuat teks harga jadi lebih menonjol */
        .text-harga { font-weight: bold; color: #198754; }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="mb-3 mt-2">
        <a href="index.html" class="btn btn-outline-dark btn-sm"><i class="bi bi-house-door"></i> Menu Utama</a>
    </div>

    <div class="card">
        <div class="header-ext text-center">
            <h3><i class="bi bi-tags"></i> Pricelist External</h3>
            <p class="mb-0 small opacity-75">Daftar Harga Barang (Di Luar Buku PL)</p>
        </div>
        <div class="p-4">
            <div id="loading" class="text-center py-5">
                <div class="spinner-border text-dark" role="status"></div>
                <p class="mt-2 text-muted">Mencari harga barang...</p>
            </div>
            
            <div class="table-responsive">
                <table id="extTable" class="table table-hover w-100" style="display:none;">
                    <thead class="table-dark"><tr id="headerRow"></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
    const sheetID = '13UBpJFMI3osx9blzUy9Z7-FnYN8efF4znUT_vN3fxWM';
    const sheetName = 'PL_External_diluar_Buku_PL'; 

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
        if (lines.length === 0) return { data: [], headers: [] };
        
        const csvRegex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
        const headers = lines[0].split(csvRegex).map(h => h.replace(/^"|"$/g, '').trim());

        const result = [];
        for (let i = 1; i < lines.length; i++) {
            const obj = {};
            const currentline = lines[i].split(csvRegex);
            headers.forEach((header, index) => {
                let val = currentline[index] || '';
                val = val.replace(/^"|"$/g, '').trim();
                obj[header] = val;
            });
            result.push(obj);
        }
        return { data: result, headers: headers };
    }

    async function loadExternalPL() {
        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
        
        try {
            const response = await fetch(csvUrl);
            const csvText = await response.text();
            const { data, headers } = parseCSV(csvText);

            if (headers.length === 0) throw new Error("Data Kosong");

            headers.forEach(h => $('#headerRow').append(`<th>${h}</th>`));

            data.forEach(row => {
                let htmlRow = '<tr>';
                headers.forEach(h => {
                    let val = row[h] || '-';
                    // Jika kolom adalah "Harga", kasih warna hijau biar enak dilihat
                    if (h.toLowerCase().includes('harga')) {
                        htmlRow += `<td class="text-harga">${val}</td>`;
                    } else {
                        htmlRow += `<td>${val}</td>`;
                    }
                });
                htmlRow += '</tr>';
                $('#tableBody').append(htmlRow);
            });

            $('#loading').hide();
            $('#extTable').fadeIn();
            $('#extTable').DataTable({
                responsive: true,
                language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/id.json' }
            });

        } catch (error) {
            $('#loading').html('<p class="text-danger">Gagal memuat data. Pastikan tab "PL_External" sudah ada.</p>');
        }
    }

    $(document).ready(loadExternalPL);
</script>
</body>
</html>
