<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Barang Internal SMB</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        body { background-color: #f4f7f6; padding-top: 30px; font-family: 'Segoe UI', sans-serif; }
        .nav-pills .nav-link { color: #555; font-weight: 500; cursor: pointer; border: 1px solid #ddd; margin: 2px; }
        .nav-pills .nav-link.active { background-color: #0d6efd !important; color: white !important; }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .header-smb { background: linear-gradient(135deg, #0d6efd 0%, #003d99 100%); color: white; padding: 25px; border-radius: 15px 15px 0 0; }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="mb-3">
        <a href="index.html" class="btn btn-outline-dark btn-sm"><i class="bi bi-house-door"></i> Menu Utama</a>
    </div>
    <div class="card">
        <div class="header-smb text-center">
            <h3><i class="bi bi-box-seam-fill"></i> Monitoring Stok Sinar Mega Bintang</h3>
            <p class="mb-0 small opacity-75">Data Terupdate</p>
        </div>
        
        <div class="p-4">
            <ul class="nav nav-pills nav-justified mb-4" id="categoryTabs"></ul>

            <div id="loading" class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Mengambil data dari Google Sheets...</p>
            </div>
            
            <div class="table-responsive">
                <table id="stokTable" class="table table-hover w-100" style="display:none;">
                    <thead class="table-dark"><tr id="headerRow"></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
    const sheetID = '13UBpJFMI3osx9blzUy9Z7-FnYN8efF4znUT_vN3fxWM';
    const categories = ['Area Gudang Tengah', 'Area Depan Kantor', 'Area Gudang Depan', 'Area Gudang Samping'];

    let dataTable;

    // Fungsi Simple CSV Parser (Native JS)
    function parseCSV(text) {
        const lines = text.split('\n').filter(line => line.trim() !== '');
        const result = [];
        const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());

        for (let i = 1; i < lines.length; i++) {
            const obj = {};
            const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // Regex untuk handle koma di dalam kutip
            
            headers.forEach((header, index) => {
                obj[header] = (currentline[index] || '').replace(/"/g, '').trim();
            });
            result.push(obj);
        }
        return { data: result, headers: headers };
    }

    async function loadData(categoryName) {
        if (dataTable) { dataTable.destroy(); }
        $('#headerRow').empty();
        $('#tableBody').empty();
        $('#stokTable').hide();
        $('#loading').show();

        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(categoryName)}`;

        try {
            const response = await fetch(csvUrl);
            const csvText = await response.text();
            const { data, headers } = parseCSV(csvText);

            if (headers.length === 0) throw new Error("Data Kosong");

            // Buat Header
            headers.forEach(h => $('#headerRow').append(`<th>${h}</th>`));

            // Buat Baris
            data.forEach(row => {
                let htmlRow = '<tr>';
                headers.forEach(h => htmlRow += `<td>${row[h] || '-'}</td>`);
                htmlRow += '</tr>';
                $('#tableBody').append(htmlRow);
            });

            $('#loading').hide();
            $('#stokTable').fadeIn();
            
            dataTable = $('#stokTable').DataTable({
                responsive: true,
                language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/id.json' }
            });

        } catch (error) {
            console.error(error);
            $('#loading').html('<p class="text-danger">Gagal memuat data. Cek Izin Share Google Sheets (Anyone with link).</p>');
        }
    }

    function initTabs() {
        categories.forEach((cat, index) => {
            const isActive = index === 0 ? 'active' : '';
            $('#categoryTabs').append(`
                <li class="nav-item">
                    <a class="nav-link ${isActive}" onclick="handleTabClick(this, '${cat}')">${cat}</a>
                </li>
            `);
        });
        loadData(categories[0]);
    }

    function handleTabClick(element, cat) {
        $('.nav-link').removeClass('active');
        $(element).addClass('active');
        loadData(cat);
    }

    $(document).ready(initTabs);
</script>
</body>
</html>
